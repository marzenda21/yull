<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Buat Yuli ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --white: #ffffff; --text-color: #590d22; }
        
        body {
            margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            /* PENGATURAN BACKGROUND GAMBAR */
            background-image: url('background.jpg');
            background-size: cover;          /* Memastikan gambar memenuhi layar */
            background-position: center;     /* Memastikan fokus gambar di tengah */
            background-repeat: no-repeat;
            background-attachment: fixed;    /* Membuat background diam saat discroll */
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Overlay gelap agar teks lebih terbaca */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.3); /* Gelap tipis agar teks putih/card terlihat jelas */
            z-index: 0;
        }
        
        /* Dekorasi */
        #decor-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .decor { position: absolute; font-size: 24px; animation: float-around 10s infinite linear; }
        @keyframes float-around { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

        /* Kartu */
        .card { background: var(--white); padding: 2rem; border-radius: 40px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 400px; z-index: 10; position: relative; }
        
        /* Gambar & Musik */
        .photo-container { width: 120px; height: 120px; margin: 0 auto 15px auto; border-radius: 30px; overflow: hidden; border: 4px solid white; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; }
        #question-image { max-width: 150px; height: auto; border-radius: 15px; margin-bottom: 10px; display: none; border: 2px solid #ffccd5; }
        
        #lyrics { font-size: 0.8rem; color: #888; margin-top: 15px; height: 50px; overflow-y: auto; font-style: italic; }

        .btn { background: #ff4d6d; color: white; border: none; padding: 12px 25px; border-radius: 20px; font-weight: 700; cursor: pointer; margin-top: 10px; width: 100%; transition: 0.3s; }
        .btn:hover { background: #ff758f; transform: scale(1.05); }
        .option-btn { background: #f8f9fa; border: 2px solid #ffccd5; padding: 10px; border-radius: 15px; margin-bottom: 8px; width: 100%; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
        .option-btn:hover { background: #ffccd5; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="to_the_bone.mp3" type="audio/mpeg">
    </audio>

    <div id="decor-container"></div>

    <div id="intro" class="card">
        <h1>Hawooo Hawoo! ✨</h1>
        <div class="photo-container"><img src="yuli_wisuda.png" alt="Yuli"></div>
        <p>Main yuk, lihat seberapa kenal kamu sama Akuuu!</p>
        <button class="btn" onclick="startExperience()">Mulai Sekarang!</button>
        <p><i>Kencengin Volumenya Klo udh Klik Mulai!</i></p>
    </div>

    <div id="quiz" class="card hidden">
        <h2 id="question">Pertanyaan</h2>
        <img id="question-image" src="" alt="Kalcer">
        <div id="options"></div>
        <div id="feedback"></div>
        <div id="lyrics">"Maybe one day you'll call me and tell me that you're sorry..." - Pamungkas</div>
    </div>

    <script>
        // Dekorasi
        const container = document.getElementById('decor-container');
        const items = ['🌸', '🦋', '💖', '✨', '🌼'];
        for(let i=0; i<30; i++) {
            const div = document.createElement('div');
            div.className = 'decor';
            div.innerHTML = items[Math.floor(Math.random() * items.length)];
            div.style.left = Math.random() * 100 + 'vw';
            div.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(div);
        }

        const quizData = [
            { q: "Berapa umur Irfan?", a: ["20", "21", "22", "23"], correct: 2 },
            { q: "Di mana rumah Irfan?", a: ["Probolinggo", "Sidoarjo", "Surabaya", "Malang"], correct: 0 },
            { q: "Bulan kapan aku pertama kali ngechat kamu?", a: ["Januari", "Februari", "Maret", "April"], correct: 2 },
            { q: "Topik apa yang pertama kali aku tanyakan?", a: ["Tanya tugas", "Komen postingan mu", "Tanya lokasi", "Tanya hobi"], correct: 1 },
            { q: "Apa hobi Irfan?", a: ["Masak", "Desain dan coding", "Futsal", "Tidur"], correct: 1 },
            { q: "Apa itu Patriarki?", a: ["Sistem kekuasaan laki-laki", "Jenis makanan", "Nama bunga", "Merk baju"], correct: 0 },
            { q: "Mana gaya Irfan yang paling 'Kalcer'?", a: ["Formal", "Streetwear Metal", "Jas", "Batik"], correct: 1, img: "foto_kalcer.jpg" },
            { q: "Apa kebangsaan kita?", a: ["Indonesia", "Malaysia", "Singapura", "Thailand"], correct: 0 },
            { q: "Proyek apa yang lagi dikerjain Irfan?", a: ["Thesis IoT", "Jualan Bakso", "Jadi Atlet", "Tidur"], correct: 0 },
            { q: "Apa framework web kesukaan Irfan?", a: ["Vue", "Angular", "Laravel", "jQuery"], correct: 2 }
        ];

        let currentQ = 0;
        let score = 0;

        function startExperience() {
            const music = document.getElementById('bgMusic');
            music.play();
            nextSlide('quiz');
        }

        function nextSlide(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'quiz') showQuestion();
        }

        function showQuestion() {
            const data = quizData[currentQ];
            document.getElementById('question').innerText = data.q;
            
            const img = document.getElementById('question-image');
            if(data.img) { img.src = data.img; img.style.display = 'block'; } 
            else { img.style.display = 'none'; }

            const optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            
            data.a.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = txt;
                b.onclick = () => check(i);
                optDiv.appendChild(b);
            });
        }

        function check(idx) {
            if(idx === quizData[currentQ].correct) score++;
            currentQ++;
            if(currentQ < quizData.length) showQuestion();
            else showFinalResult();
        }

        function showFinalResult() {
            const percentage = (score / quizData.length) * 100;
            let msg = percentage >= 80 ? "Wah, Pinter banget kamu! 😍" : "Coba lagi lain kali ya... 😜";
            document.getElementById('quiz').innerHTML = `<h1>Selesai!</h1><p>Skor: ${score}/${quizData.length}</p><p><strong>${msg}</strong></p><button class="btn" onclick="location.reload()">Main Lagi</button>`;
        }
    </script>
</body>
</html>
